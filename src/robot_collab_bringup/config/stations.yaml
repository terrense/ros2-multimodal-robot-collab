stations:
  tool_shelf:
    # Approach pose in free space in front of the shelf model (which is centered
    # at 1.25,-0.75 with a collision box). Nav2 cannot plan a goal inside the
    # obstacle, so the pickup pose stands off and faces it.
    frame_id: map
    pose:
      x: 0.95
      y: -0.35
      yaw: -0.93
    role: pickup
  station_a:
    frame_id: map
    pose:
      x: 3.20
      y: 0.40
      yaw: 0.00
    role: workstation
  station_b:
    frame_id: map
    pose:
      x: 4.15
      y: -1.10
      yaw: 3.14
    role: workstation
  handover_zone:
    frame_id: map
    pose:
      x: 2.10
      y: 1.35
      yaw: -1.57
    role: delivery

