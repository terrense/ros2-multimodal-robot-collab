mission_state_machine:
  ros__parameters:
    simulate_step_seconds: 0.6
    motion_enabled: true
    max_retries: 1

nav_skill_server:
  ros__parameters:
    backend: simulated
    simulate_step_seconds: 0.4
    station_file: ""
    nav2_action_name: /navigate_to_pose
    nav2_server_timeout_sec: 5.0
    nav2_goal_timeout_sec: 120.0
    known_stations:
      - tool_shelf
      - station_a
      - station_b
      - handover_zone

arm_skill_server:
  ros__parameters:
    simulate_step_seconds: 0.45
    min_detection_confidence: 0.75

tool_detector_node:
  ros__parameters:
    tool_id: hex_key_3mm
    tool_label: 3mm hex key
    source_frame: tool_camera_link
    publish_hz: 1.0
    confidence: 0.88

face_auth_node:
  ros__parameters:
    authorized_operators:
      - operator_001
      - operator_002
    simulate_step_seconds: 0.35

gesture_recognizer_node:
  ros__parameters:
    auto_emit: false
    emit_interval_sec: 8.0
    gesture: thumb_up
    operator_id: operator_001

yolov8_tool_detector_node:
  ros__parameters:
    model_path: models/yolov8n.pt
    camera_topic: /camera/color/image_raw
    source_frame: camera_link
    min_confidence: 0.45
    # Stock COCO weights cannot see project tools, so for the end-to-end demo we
    # also map a few easy-to-place COCO classes onto the requested tool id: drop
    # any of these objects in front of the camera and the mission unblocks.
    # Tool-specific accuracy (custom weights) is a later phase.
    class_to_tool_json: '{"wrench":"wrench","screwdriver":"screwdriver","hex_key":"hex_key_3mm","bottle":"hex_key_3mm","cup":"hex_key_3mm","cell phone":"hex_key_3mm","remote":"hex_key_3mm","scissors":"hex_key_3mm"}'

openpose_gesture_node:
  ros__parameters:
    camera_topic: /camera/color/image_raw
    operator_id: operator_001
    openpose_root: third_party/openpose
    model_folder: third_party/openpose/models
    min_keypoint_confidence: 0.25

voice_gateway_node:
  ros__parameters:
    tts_enabled: true
    forward_asr_to_agent: true

agent_gateway_node:
  ros__parameters:
    default_operator_id: operator_001
    require_confirmation: true

vins_mono_bridge_node:
  ros__parameters:
    vins_odometry_topic: /vins_estimator/odometry
    pose_topic: /slam/vins_pose
    status_topic: /slam/vins_status
    publish_tf: true
    map_frame: map
    base_frame: base_link
